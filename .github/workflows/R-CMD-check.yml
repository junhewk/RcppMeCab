name: R-CMD-check

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        mecab_lang: ['ja', 'ko']
        platform: [ubuntu-latest, windows-latest, macos-latest]
        r-version: ['release']
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up R ${{ matrix.r-version }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
      - name: Install MeCab (Japanese, Ubuntu)
        if: ${{ matrix.platform == 'ubuntu-latest' && matrix.mecab_lang == 'ja' }}
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y mecab libmecab-dev mecab-ipadic-utf8
          sudo ldconfig
      - name: Install MeCab (Korean, Ubuntu)
        if: ${{ matrix.platform == 'ubuntu-latest' && matrix.mecab_lang == 'ko' }}
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y autoconf automake
          MECAB_KO_BUILD=$(mktemp -d)
          cd "$MECAB_KO_BUILD"
          curl -fsSL "https://github.com/junhewk/RcppMeCab/releases/download/0.0.1.0/mecab-0.996-ko-0.9.2.tar.gz" -o mecab-ko.tar.gz
          tar xzf mecab-ko.tar.gz
          cd mecab-0.996-ko-0.9.2
          ./configure
          make
          sudo make install
          sudo ldconfig
          cd "$MECAB_KO_BUILD"
          curl -fsSL "https://github.com/junhewk/RcppMeCab/releases/download/0.0.1.0/mecab-ko-dic-2.1.1-20180720.tar.gz" -o mecab-ko-dic.tar.gz
          tar xzf mecab-ko-dic.tar.gz
          cd mecab-ko-dic-2.1.1-20180720
          ./autogen.sh
          ./configure
          make
          sudo make install
          rm -rf "$MECAB_KO_BUILD"
      - name: Install MeCab (Japanese, macOS)
        if: ${{ matrix.platform == 'macos-latest' && matrix.mecab_lang == 'ja' }}
        run: brew install mecab mecab-ipadic
      - name: Install dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck"))
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}
      - name: Check
        env:
          MECAB_LANG: ${{ matrix.mecab_lang }}
        run: rcmdcheck::rcmdcheck(args = c("--no-multiarch", "--no-manual", "--as-cran"), build_args = c("--no-manual", "--no-build-vignettes"), error_on = "error")
        shell: Rscript {0}
